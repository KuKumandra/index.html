<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Личные сообщения</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f4f7ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
            margin: 5px 0;
        }
        button:hover {
            background: #0056b3;
        }
        button:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }
        .logout-btn {
            background: #dc3545;
        }
        .logout-btn:hover {
            background: #b02a37;
        }
        .auth-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .auth-section button {
            flex: 1;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }
        .user-email {
            flex: 1;
            font-size: 14px;
            color: #333;
        }
        .guest-message {
            color: #666;
            font-style: italic;
            text-align: center;
            padding: 20px;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }
        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            background: #f0f0f0;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        .tab.active {
            background: #007bff;
            color: white;
        }
        .users-list {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 10px;
            margin: 10px 0;
        }
        .user-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-bottom: 1px solid #e0e0e0;
            cursor: pointer;
        }
        .user-item:hover {
            background: #f0f0f0;
        }
        .user-item.selected {
            background: #e3f2fd;
        }
        .messages-container {
            height: 400px;
            overflow-y: auto;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
            display: flex;
            flex-direction: column;
        }
        .message {
            max-width: 70%;
            margin: 10px 0;
            padding: 10px;
            border-radius: 12px;
            position: relative;
        }
        .message.sent {
            align-self: flex-end;
            background: #007bff;
            color: white;
        }
        .message.received {
            align-self: flex-start;
            background: #f0f0f0;
        }
        .message-time {
            font-size: 10px;
            margin-top: 5px;
            opacity: 0.7;
        }
        .message-image {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
            margin-top: 5px;
        }
        .dm-form {
            margin-top: 20px;
        }
        .back-btn {
            background: #6c757d;
            margin-bottom: 10px;
        }
        .error-message {
            color: #dc3545;
            font-size: 14px;
            margin: 10px 0;
            text-align: center;
        }
        .unread-badge {
            background: #dc3545;
            color: white;
            border-radius: 50%;
            padding: 2px 6px;
            font-size: 12px;
            margin-left: 5px;
        }
    </style>
</head>

<body>
<div class="container">
    <h1>💬 Личные сообщения</h1>
   
    <div id="authSection" class="auth-section">
        <button id="loginBtn">🔐 Войти через Google</button>
        <button id="logoutBtn" class="logout-btn" style="display: none;">🚪 Выйти</button>
    </div>

    <div id="userInfo" class="user-info" style="display: none;">
        <img id="userAvatar" class="user-avatar" src="" alt="Avatar">
        <span id="userEmail" class="user-email"></span>
    </div>

    <div id="mainContent" style="display: none;">
        <div class="tabs">
            <div class="tab active" id="usersTab" onclick="switchTab('users')">👥 Пользователи</div>
            <div class="tab" id="chatsTab" onclick="switchTab('chats')">💬 Чаты</div>
        </div>

        <div id="usersSection">
            <h3>Все пользователи</h3>
            <div id="usersList" class="users-list"></div>
        </div>

        <div id="chatsSection" style="display: none;">
            <h3>Мои чаты</h3>
            <div id="chatsList" class="users-list"></div>
        </div>

        <div id="chatSection" style="display: none;">
            <button id="backToUsersBtn" class="back-btn">← Назад</button>
            <h3 id="chatWithUser"></h3>
           
            <div id="messagesContainer" class="messages-container"></div>

            <div class="dm-form">
                <textarea id="dmMessage" placeholder="Введите сообщение..." rows="2" required></textarea>
               
                <input type="file" id="dmImageUpload" accept="image/*">
                <div id="dmImagePreview" style="margin: 10px 0; display: none;">
                    <img id="dmPreviewImg" style="max-width: 100%; max-height: 150px; border-radius: 8px;">
                </div>
               
                <button id="sendDmBtn">📤 Отправить сообщение</button>
            </div>
        </div>
    </div>

    <div id="guestMessage" class="guest-message" style="display: none;">
        👋 Пожалуйста, войдите через Google, чтобы начать общение
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, where, orderBy, onSnapshot, serverTimestamp, doc, getDocs, getDoc, updateDoc, increment, setDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAMMgGxN27p0FYmp-LVMmKw5KJbvFM-KhQ",
        authDomain: "project1-c17c1.firebaseapp.com",
        projectId: "project1-c17c1",
        storageBucket: "project1-c17c1.firebasestorage.app",
        messagingSenderId: "774031073336",
        appId: "1:774031073336:web:4ecdc3ad60a52f076786cd",
        measurementId: "G-GKXVQK98QR"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const storage = getStorage(app);
    const provider = new GoogleAuthProvider();

    // DOM элементы
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const userInfo = document.getElementById('userInfo');
    const userAvatar = document.getElementById('userAvatar');
    const userEmail = document.getElementById('userEmail');
    const mainContent = document.getElementById('mainContent');
    const guestMessage = document.getElementById('guestMessage');
    const usersList = document.getElementById('usersList');
    const chatsList = document.getElementById('chatsList');
    const messagesContainer = document.getElementById('messagesContainer');
    const chatSection = document.getElementById('chatSection');
    const usersSection = document.getElementById('usersSection');
    const chatsSection = document.getElementById('chatsSection');
    const chatWithUser = document.getElementById('chatWithUser');
    const backToUsersBtn = document.getElementById('backToUsersBtn');
    const dmMessage = document.getElementById('dmMessage');
    const dmImageUpload = document.getElementById('dmImageUpload');
    const dmImagePreview = document.getElementById('dmImagePreview');
    const dmPreviewImg = document.getElementById('dmPreviewImg');
    const sendDmBtn = document.getElementById('sendDmBtn');

    let currentUser = null;
    let selectedUserId = null;
    let unsubscribeMessages = null;
    let currentChatId = null;

    // Переключение табов
    window.switchTab = (tab) => {
        const usersTab = document.getElementById('usersTab');
        const chatsTab = document.getElementById('chatsTab');
        
        if (tab === 'users') {
            usersTab.classList.add('active');
            chatsTab.classList.remove('active');
            usersSection.style.display = 'block';
            chatsSection.style.display = 'none';
            chatSection.style.display = 'none';
            loadUsers();
        } else {
            usersTab.classList.remove('active');
            chatsTab.classList.add('active');
            usersSection.style.display = 'none';
            chatsSection.style.display = 'block';
            chatSection.style.display = 'none';
            loadChats();
        }
    };

    // Загрузка пользователей
    const loadUsers = async () => {
        if (!currentUser) return;
        
        try {
            const usersQuery = query(collection(db, "users"));
            const snapshot = await getDocs(usersQuery);
            
            usersList.innerHTML = '';
            
            snapshot.forEach((doc) => {
                const userData = doc.data();
                if (doc.id !== currentUser.uid) {
                    const userElement = document.createElement('div');
                    userElement.className = 'user-item';
                    userElement.innerHTML = `
                        <img src="${userData.photoURL || 'https://via.placeholder.com/40'}" style="width: 40px; height: 40px; border-radius: 50%;">
                        <div>
                            <div>${userData.displayName || 'Пользователь'}</div>
                            <div style="font-size: 12px; color: #666;">${userData.email}</div>
                        </div>
                    `;
                    userElement.onclick = () => openChat(doc.id, userData);
                    usersList.appendChild(userElement);
                }
            });
        } catch (error) {
            console.error('Ошибка загрузки пользователей:', error);
        }
    };

    // Загрузка чатов
    const loadChats = async () => {
        if (!currentUser) return;
        
        try {
            const chatsQuery = query(
                collection(db, "chats"),
                where("participants", "array-contains", currentUser.uid)
            );
            const snapshot = await getDocs(chatsQuery);
            
            chatsList.innerHTML = '';
            
            for (const chatDoc of snapshot.docs) {
                const chatData = chatDoc.data();
                const otherUserId = chatData.participants.find(id => id !== currentUser.uid);
                
                // Получаем информацию о другом пользователе
                const userDoc = await getDoc(doc(db, "users", otherUserId));
                const userData = userDoc.data();
                
                // Получаем последнее сообщение
                const messagesQuery = query(
                    collection(db, "chats", chatDoc.id, "messages"),
                    orderBy("timestamp", "desc"),
                    limit(1)
                );
                const messagesSnapshot = await getDocs(messagesQuery);
                let lastMessage = 'Нет сообщений';
                if (!messagesSnapshot.empty) {
                    lastMessage = messagesSnapshot.docs[0].data().text || 'Изображение';
                }
                
                const chatElement = document.createElement('div');
                chatElement.className = 'user-item';
                chatElement.innerHTML = `
                    <img src="${userData?.photoURL || 'https://via.placeholder.com/40'}" style="width: 40px; height: 40px; border-radius: 50%;">
                    <div style="flex: 1;">
                        <div style="display: flex; justify-content: space-between;">
                            <span>${userData?.displayName || 'Пользователь'}</span>
                            <span style="font-size: 12px; color: #666;">${chatData.lastMessageTime ? new Date(chatData.lastMessageTime.toDate()).toLocaleTimeString() : ''}</span>
                        </div>
                        <div style="font-size: 12px; color: #666;">${lastMessage}</div>
                    </div>
                `;
                chatElement.onclick = () => openChat(otherUserId, userData);
                chatsList.appendChild(chatElement);
            }
        } catch (error) {
            console.error('Ошибка загрузки чатов:', error);
        }
    };

    // Открыть чат с пользователем
    const openChat = async (userId, userData) => {
        selectedUserId = userId;
        chatWithUser.textContent = `Чат с ${userData?.displayName || 'Пользователем'}`;
        
        // Создаем или получаем существующий чат
        const chatId = [currentUser.uid, userId].sort().join('_');
        currentChatId = chatId;
        
        // Проверяем существует ли документ чата
        const chatRef = doc(db, "chats", chatId);
        const chatDoc = await getDoc(chatRef);
        
        if (!chatDoc.exists()) {
            await setDoc(chatRef, {
                participants: [currentUser.uid, userId],
                createdAt: serverTimestamp(),
                lastMessageTime: serverTimestamp()
            });
        }
        
        // Отписываемся от предыдущих сообщений
        if (unsubscribeMessages) {
            unsubscribeMessages();
        }
        
        // Подписываемся на новые сообщения
        const messagesQuery = query(
            collection(db, "chats", chatId, "messages"),
            orderBy("timestamp", "asc")
        );
        
        unsubscribeMessages = onSnapshot(messagesQuery, (snapshot) => {
            messagesContainer.innerHTML = '';
            
            snapshot.forEach((doc) => {
                const message = doc.data();
                const messageElement = document.createElement('div');
                messageElement.className = `message ${message.senderId === currentUser.uid ? 'sent' : 'received'}`;
                
                let messageHTML = `<div>${message.text || ''}</div>`;
                
                if (message.imageUrl) {
                    messageHTML += `<img src="${message.imageUrl}" class="message-image">`;
                }
                
                const timeStr = message.timestamp?.toDate 
                    ? message.timestamp.toDate().toLocaleTimeString()
                    : 'Только что';
                
                messageHTML += `<div class="message-time">${timeStr}</div>`;
                
                messageElement.innerHTML = messageHTML;
                messagesContainer.appendChild(messageElement);
            });
            
            // Скролл вниз
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        });
        
        usersSection.style.display = 'none';
        chatsSection.style.display = 'none';
        chatSection.style.display = 'block';
    };

    // Отправка сообщения
    sendDmBtn.addEventListener('click', async () => {
        if (!currentUser || !selectedUserId || !currentChatId) {
            alert('Ошибка: выберите получателя');
            return;
        }

        const text = dmMessage.value.trim();
        const imageFile = dmImageUpload.files[0];
        
        if (!text && !imageFile) {
            alert('Введите сообщение или выберите изображение');
            return;
        }

        sendDmBtn.disabled = true;
        sendDmBtn.textContent = 'Отправка...';

        try {
            let imageUrl = null;
           
            if (imageFile) {
                const storageRef = ref(storage, `dm_images/${Date.now()}_${imageFile.name}`);
                await uploadBytes(storageRef, imageFile);
                imageUrl = await getDownloadURL(storageRef);
            }

            // Добавляем сообщение
            await addDoc(collection(db, "chats", currentChatId, "messages"), {
                text: text,
                imageUrl: imageUrl,
                senderId: currentUser.uid,
                receiverId: selectedUserId,
                timestamp: serverTimestamp(),
                read: false
            });

            // Обновляем время последнего сообщения в чате
            await updateDoc(doc(db, "chats", currentChatId), {
                lastMessageTime: serverTimestamp()
            });

            dmMessage.value = '';
            dmImageUpload.value = '';
            dmImagePreview.style.display = 'none';
           
        } catch (e) {
            console.error('Ошибка:', e);
            alert('Ошибка при отправке сообщения');
        } finally {
            sendDmBtn.disabled = false;
            sendDmBtn.textContent = '📤 Отправить сообщение';
        }
    });

    // Предпросмотр изображения
    dmImageUpload.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                dmPreviewImg.src = e.target.result;
                dmImagePreview.style.display = 'block';
            };
            reader.readAsDataURL(file);
        } else {
            dmImagePreview.style.display = 'none';
        }
    });

    // Кнопка назад
    backToUsersBtn.addEventListener('click', () => {
        if (unsubscribeMessages) {
            unsubscribeMessages();
        }
        chatSection.style.display = 'none';
        usersSection.style.display = 'block';
        chatsSection.style.display = 'none';
        document.getElementById('usersTab').classList.add('active');
        document.getElementById('chatsTab').classList.remove('active');
    });

    // Сохранение пользователя в Firestore при входе
    const saveUserToFirestore = async (user) => {
        const userRef = doc(db, "users", user.uid);
        await setDoc(userRef, {
            email: user.email,
            displayName: user.displayName,
            photoURL: user.photoURL,
            lastSeen: serverTimestamp()
        }, { merge: true });
    };

    // Отслеживание состояния аутентификации
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            loginBtn.style.display = 'none';
            logoutBtn.style.display = 'block';
            userInfo.style.display = 'flex';
            userAvatar.src = user.photoURL || 'https://via.placeholder.com/40';
            userEmail.textContent = user.email;
            mainContent.style.display = 'block';
            guestMessage.style.display = 'none';
            
            await saveUserToFirestore(user);
            loadUsers();
        } else {
            currentUser = null;
            loginBtn.style.display = 'block';
            logoutBtn.style.display = 'none';
            userInfo.style.display = 'none';
            mainContent.style.display = 'none';
            guestMessage.style.display = 'block';
            
            if (unsubscribeMessages) {
                unsubscribeMessages();
            }
        }
    });

    // Вход через Google
    loginBtn.addEventListener('click', async () => {
        try {
            await signInWithPopup(auth, provider);
        } catch (error) {
            alert('Ошибка входа: ' + error.message);
        }
    });

    // Выход
    logoutBtn.addEventListener('click', async () => {
        try {
            await signOut(auth);
        } catch (error) {
            alert('Ошибка выхода: ' + error.message);
        }
    });

</script>

</body>
</html>
