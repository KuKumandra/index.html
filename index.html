<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Личные сообщения</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f4f7ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
            margin: 5px 0;
        }
        button:hover {
            background: #0056b3;
        }
        .logout-btn {
            background: #dc3545;
        }
        .logout-btn:hover {
            background: #b02a37;
        }
        .auth-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }
        .users-list {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 10px;
            margin: 10px 0;
        }
        .user-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-bottom: 1px solid #e0e0e0;
            cursor: pointer;
        }
        .user-item:hover {
            background: #f0f0f0;
        }
        .messages-container {
            height: 400px;
            overflow-y: auto;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
            display: flex;
            flex-direction: column;
        }
        .message {
            max-width: 70%;
            margin: 10px 0;
            padding: 10px;
            border-radius: 12px;
        }
        .message.sent {
            align-self: flex-end;
            background: #007bff;
            color: white;
        }
        .message.received {
            align-self: flex-start;
            background: #f0f0f0;
        }
        .message-time {
            font-size: 10px;
            margin-top: 5px;
            opacity: 0.7;
        }
        .back-btn {
            background: #6c757d;
            margin-bottom: 10px;
        }
        .chats-list {
            max-height: 400px;
            overflow-y: auto;
        }
        .chat-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
            cursor: pointer;
        }
        .chat-item:hover {
            background: #f0f0f0;
        }
        .last-message {
            font-size: 12px;
            color: #666;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }
        .tab {
            display: inline-block;
            padding: 10px 20px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }
        .tab.active {
            border-bottom-color: #007bff;
            color: #007bff;
            font-weight: 600;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>💬 Личные сообщения</h1>
   
    <div class="auth-section">
        <button id="loginBtn">🔐 Войти через Google</button>
        <button id="logoutBtn" class="logout-btn" style="display: none;">🚪 Выйти</button>
    </div>

    <div id="userInfo" class="user-info" style="display: none;">
        <img id="userAvatar" class="user-avatar" src="" alt="Avatar">
        <span id="userEmail" class="user-email"></span>
    </div>

    <div id="mainContent" style="display: none;">
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <span class="tab active" onclick="switchTab('chats')">💬 Чаты</span>
            <span class="tab" onclick="switchTab('users')">👥 Пользователи</span>
        </div>

        <!-- Список чатов -->
        <div id="chatsSection">
            <h3>Мои диалоги</h3>
            <div id="chatsList" class="chats-list"></div>
        </div>

        <!-- Список пользователей -->
        <div id="usersSection" style="display: none;">
            <h3>Все пользователи</h3>
            <div id="usersList" class="users-list"></div>
        </div>

        <!-- Окно чата -->
        <div id="chatSection" style="display: none;">
            <button id="backBtn" class="back-btn">← Назад</button>
            <h3 id="chatWithUser"></h3>
           
            <div id="messagesContainer" class="messages-container"></div>

            <div>
                <textarea id="messageInput" placeholder="Введите сообщение..." rows="2"></textarea>
                <button id="sendBtn">📤 Отправить</button>
            </div>
        </div>
    </div>

    <div id="guestMessage" style="display: none; text-align: center; padding: 20px; color: #666;">
        👋 Войдите, чтобы начать общаться
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, where, orderBy, onSnapshot, serverTimestamp, doc, getDocs, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
    import { getStorage } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAMMgGxN27p0FYmp-LVMmKw5KJbvFM-KhQ",
        authDomain: "project1-c17c1.firebaseapp.com",
        projectId: "project1-c17c1",
        storageBucket: "project1-c17c1.firebasestorage.app",
        messagingSenderId: "774031073336",
        appId: "1:774031073336:web:4ecdc3ad60a52f076786cd"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const storage = getStorage(app);
    const provider = new GoogleAuthProvider();

    // Элементы DOM
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const userInfo = document.getElementById('userInfo');
    const userAvatar = document.getElementById('userAvatar');
    const userEmail = document.getElementById('userEmail');
    const mainContent = document.getElementById('mainContent');
    const guestMessage = document.getElementById('guestMessage');
    const chatsSection = document.getElementById('chatsSection');
    const usersSection = document.getElementById('usersSection');
    const chatSection = document.getElementById('chatSection');
    const usersList = document.getElementById('usersList');
    const chatsList = document.getElementById('chatsList');
    const messagesContainer = document.getElementById('messagesContainer');
    const chatWithUser = document.getElementById('chatWithUser');
    const backBtn = document.getElementById('backBtn');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');

    let currentUser = null;
    let selectedUserId = null;
    let currentChatId = null;
    let unsubscribeMessages = null;

    // Переключение вкладок
    window.switchTab = (tab) => {
        const tabs = document.querySelectorAll('.tab');
        tabs.forEach(t => t.classList.remove('active'));
        
        if (tab === 'chats') {
            tabs[0].classList.add('active');
            chatsSection.style.display = 'block';
            usersSection.style.display = 'none';
            chatSection.style.display = 'none';
            loadChats();
        } else {
            tabs[1].classList.add('active');
            chatsSection.style.display = 'none';
            usersSection.style.display = 'block';
            chatSection.style.display = 'none';
            loadUsers();
        }
    };

    // Загрузка пользователей
    const loadUsers = async () => {
        if (!currentUser) return;
        
        const usersQuery = query(collection(db, "users"));
        const snapshot = await getDocs(usersQuery);
        
        usersList.innerHTML = '';
        
        snapshot.forEach((doc) => {
            if (doc.id !== currentUser.uid) {
                const userData = doc.data();
                const div = document.createElement('div');
                div.className = 'user-item';
                div.innerHTML = `
                    <img src="${userData.photoURL || 'https://via.placeholder.com/40'}" style="width: 40px; height: 40px; border-radius: 50%;">
                    <div>
                        <div>${userData.displayName || 'Пользователь'}</div>
                        <div style="font-size: 12px; color: #666;">${userData.email}</div>
                    </div>
                `;
                div.onclick = () => openChat(doc.id, userData);
                usersList.appendChild(div);
            }
        });
    };

    // Загрузка чатов
    const loadChats = async () => {
        if (!currentUser) return;
        
        const chatsQuery = query(
            collection(db, "chats"),
            where("participants", "array-contains", currentUser.uid)
        );
        const snapshot = await getDocs(chatsQuery);
        
        chatsList.innerHTML = '';
        
        for (const chatDoc of snapshot.docs) {
            const chatData = chatDoc.data();
            const otherUserId = chatData.participants.find(id => id !== currentUser.uid);
            
            const userDoc = await getDoc(doc(db, "users", otherUserId));
            const userData = userDoc.data();
            
            // Получаем последнее сообщение
            const messagesQuery = query(
                collection(db, "chats", chatDoc.id, "messages"),
                orderBy("timestamp", "desc"),
                limit(1)
            );
            const messagesSnapshot = await getDocs(messagesQuery);
            let lastMessage = 'Нет сообщений';
            if (!messagesSnapshot.empty) {
                lastMessage = messagesSnapshot.docs[0].data().text || 'Изображение';
            }
            
            const div = document.createElement('div');
            div.className = 'chat-item';
            div.innerHTML = `
                <img src="${userData?.photoURL || 'https://via.placeholder.com/40'}" style="width: 50px; height: 50px; border-radius: 50%;">
                <div style="flex: 1;">
                    <div style="display: flex; justify-content: space-between;">
                        <strong>${userData?.displayName || 'Пользователь'}</strong>
                        <span style="font-size: 12px; color: #666;">
                            ${chatData.lastMessageTime ? new Date(chatData.lastMessageTime.toDate()).toLocaleTimeString() : ''}
                        </span>
                    </div>
                    <div class="last-message">${lastMessage}</div>
                </div>
            `;
            div.onclick = () => openChat(otherUserId, userData);
            chatsList.appendChild(div);
        }
    };

    // Открыть чат
    const openChat = async (userId, userData) => {
        selectedUserId = userId;
        chatWithUser.textContent = `Чат с ${userData?.displayName || 'Пользователем'}`;
        
        const chatId = [currentUser.uid, userId].sort().join('_');
        currentChatId = chatId;
        
        // Создаем чат если его нет
        const chatRef = doc(db, "chats", chatId);
        const chatDoc = await getDoc(chatRef);
        
        if (!chatDoc.exists()) {
            await setDoc(chatRef, {
                participants: [currentUser.uid, userId],
                createdAt: serverTimestamp(),
                lastMessageTime: serverTimestamp()
            });
        }
        
        // Отписываемся от предыдущих сообщений
        if (unsubscribeMessages) {
            unsubscribeMessages();
        }
        
        // Подписываемся на сообщения
        const messagesQuery = query(
            collection(db, "chats", chatId, "messages"),
            orderBy("timestamp", "asc")
        );
        
        unsubscribeMessages = onSnapshot(messagesQuery, (snapshot) => {
            messagesContainer.innerHTML = '';
            
            snapshot.forEach((doc) => {
                const msg = doc.data();
                const div = document.createElement('div');
                div.className = `message ${msg.senderId === currentUser.uid ? 'sent' : 'received'}`;
                
                div.innerHTML = `
                    <div>${msg.text || ''}</div>
                    <div class="message-time">
                        ${msg.timestamp?.toDate ? msg.timestamp.toDate().toLocaleTimeString() : 'Только что'}
                    </div>
                `;
                
                messagesContainer.appendChild(div);
            });
            
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        });
        
        chatsSection.style.display = 'none';
        usersSection.style.display = 'none';
        chatSection.style.display = 'block';
    };

    // Отправка сообщения
    sendBtn.addEventListener('click', async () => {
        if (!currentUser || !selectedUserId || !currentChatId) {
            alert('Ошибка');
            return;
        }

        const text = messageInput.value.trim();
        if (!text) return;

        sendBtn.disabled = true;
        sendBtn.textContent = 'Отправка...';

        try {
            await addDoc(collection(db, "chats", currentChatId, "messages"), {
                text: text,
                senderId: currentUser.uid,
                receiverId: selectedUserId,
                timestamp: serverTimestamp(),
                read: false
            });

            await updateDoc(doc(db, "chats", currentChatId), {
                lastMessageTime: serverTimestamp()
            });

            messageInput.value = '';
           
        } catch (e) {
            console.error('Ошибка:', e);
            alert('Ошибка при отправке');
        } finally {
            sendBtn.disabled = false;
            sendBtn.textContent = '📤 Отправить';
        }
    });

    // Кнопка назад
    backBtn.addEventListener('click', () => {
        if (unsubscribeMessages) {
            unsubscribeMessages();
        }
        chatSection.style.display = 'none';
        chatsSection.style.display = 'block';
        document.querySelector('.tab').classList.add('active');
        document.querySelectorAll('.tab')[1].classList.remove('active');
    });

    // Сохранение пользователя
    const saveUser = async (user) => {
        const userRef = doc(db, "users", user.uid);
        await setDoc(userRef, {
            email: user.email,
            displayName: user.displayName,
            photoURL: user.photoURL,
            lastSeen: serverTimestamp()
        }, { merge: true });
    };

    // Отслеживание входа
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            loginBtn.style.display = 'none';
            logoutBtn.style.display = 'block';
            userInfo.style.display = 'flex';
            userAvatar.src = user.photoURL || 'https://via.placeholder.com/40';
            userEmail.textContent = user.email;
            mainContent.style.display = 'block';
            guestMessage.style.display = 'none';
            
            await saveUser(user);
            loadChats();
        } else {
            currentUser = null;
            loginBtn.style.display = 'block';
            logoutBtn.style.display = 'none';
            userInfo.style.display = 'none';
            mainContent.style.display = 'none';
            guestMessage.style.display = 'block';
            
            if (unsubscribeMessages) {
                unsubscribeMessages();
            }
        }
    });

    loginBtn.addEventListener('click', () => signInWithPopup(auth, provider));
    logoutBtn.addEventListener('click', () => signOut(auth));

</script>
</body>
</html>
