<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Личные сообщения</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f4f7ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
            margin: 5px 0;
        }
        button:hover {
            background: #0056b3;
        }
        button:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }
        .logout-btn {
            background: #dc3545;
        }
        .logout-btn:hover {
            background: #b02a37;
        }
        .auth-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .auth-section button {
            flex: 1;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }
        .user-email {
            flex: 1;
            font-size: 14px;
            color: #333;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            border-bottom: 2px solid #f0f0f0;
        }
        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            color: #666;
            transition: all 0.3s;
        }
        .tab.active {
            color: #007bff;
            border-bottom: 2px solid #007bff;
            margin-bottom: -2px;
        }
        .users-list, .chats-list {
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 10px;
            margin: 10px 0;
        }
        .user-item, .chat-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
            cursor: pointer;
            transition: background 0.2s;
        }
        .user-item:hover, .chat-item:hover {
            background: #f8f9fa;
        }
        .user-item:last-child, .chat-item:last-child {
            border-bottom: none;
        }
        .user-avatar-small {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
        }
        .user-info-small {
            flex: 1;
        }
        .user-name {
            font-weight: 600;
            color: #333;
        }
        .user-email-small {
            font-size: 12px;
            color: #666;
        }
        .last-message {
            font-size: 13px;
            color: #666;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 250px;
        }
        .message-time {
            font-size: 11px;
            color: #999;
        }
        .messages-container {
            height: 400px;
            overflow-y: auto;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 18px;
            position: relative;
            word-wrap: break-word;
        }
        .message.sent {
            align-self: flex-end;
            background: #007bff;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message.received {
            align-self: flex-start;
            background: #f1f3f5;
            color: #333;
            border-bottom-left-radius: 4px;
        }
        .message-time {
            font-size: 10px;
            margin-top: 5px;
            opacity: 0.7;
            text-align: right;
        }
        .message-image {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
            margin-top: 5px;
            cursor: pointer;
        }
        .dm-form {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        .back-btn {
            background: #6c757d;
            margin-bottom: 10px;
            width: auto;
            padding: 8px 20px;
        }
        .back-btn:hover {
            background: #5a6268;
        }
        .chat-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        .chat-header img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
        }
        .chat-header-info h3 {
            margin: 0;
            color: #333;
        }
        .chat-header-info p {
            margin: 5px 0 0;
            font-size: 12px;
            color: #666;
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #666;
            font-style: italic;
        }
        .image-preview {
            margin: 10px 0;
            padding: 10px;
            background: #fff;
            border-radius: 8px;
            position: relative;
        }
        .image-preview img {
            max-width: 100%;
            max-height: 150px;
            border-radius: 8px;
        }
        .remove-image {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            color: #dc3545;
            font-weight: bold;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>💬 Личные сообщения</h1>
   
    <div id="authSection" class="auth-section">
        <button id="loginBtn">🔐 Войти через Google</button>
        <button id="logoutBtn" class="logout-btn" style="display: none;">🚪 Выйти</button>
    </div>

    <div id="userInfo" class="user-info" style="display: none;">
        <img id="userAvatar" class="user-avatar" src="" alt="Avatar">
        <span id="userEmail" class="user-email"></span>
    </div>

    <div id="mainContent" style="display: none;">
        <div class="tabs">
            <div class="tab active" onclick="switchTab('chats')">💬 Чаты</div>
            <div class="tab" onclick="switchTab('users')">👥 Пользователи</div>
        </div>

        <!-- Список чатов -->
        <div id="chatsSection">
            <div id="chatsList" class="chats-list"></div>
        </div>

        <!-- Список пользователей -->
        <div id="usersSection" style="display: none;">
            <div id="usersList" class="users-list"></div>
        </div>

        <!-- Окно чата -->
        <div id="chatSection" style="display: none;">
            <button id="backToChatsBtn" class="back-btn">← К списку чатов</button>
            
            <div id="chatHeader" class="chat-header"></div>
           
            <div id="messagesContainer" class="messages-container"></div>

            <div class="dm-form">
                <textarea id="messageInput" placeholder="Введите сообщение..." rows="2"></textarea>
                
                <input type="file" id="imageUpload" accept="image/*" style="display: none;">
                <button id="attachImageBtn" style="background: #28a745; margin-top: 5px;">📷 Прикрепить изображение</button>
                
                <div id="imagePreview" class="image-preview" style="display: none;">
                    <img id="previewImg">
                    <button id="removeImageBtn" class="remove-image">✕</button>
                </div>
                
                <button id="sendBtn">📤 Отправить сообщение</button>
            </div>
        </div>
    </div>

    <div id="guestMessage" class="empty-state" style="display: none;">
        👋 Пожалуйста, войдите через Google, чтобы начать общение
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, where, orderBy, onSnapshot, serverTimestamp, doc, getDocs, getDoc, setDoc, updateDoc, limit } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAMMgGxN27p0FYmp-LVMmKw5KJbvFM-KhQ",
        authDomain: "project1-c17c1.firebaseapp.com",
        projectId: "project1-c17c1",
        storageBucket: "project1-c17c1.firebasestorage.app",
        messagingSenderId: "774031073336",
        appId: "1:774031073336:web:4ecdc3ad60a52f076786cd"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const storage = getStorage(app);
    const provider = new GoogleAuthProvider();

    // DOM элементы
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const userInfo = document.getElementById('userInfo');
    const userAvatar = document.getElementById('userAvatar');
    const userEmail = document.getElementById('userEmail');
    const mainContent = document.getElementById('mainContent');
    const guestMessage = document.getElementById('guestMessage');
    const chatsSection = document.getElementById('chatsSection');
    const usersSection = document.getElementById('usersSection');
    const chatSection = document.getElementById('chatSection');
    const chatsList = document.getElementById('chatsList');
    const usersList = document.getElementById('usersList');
    const messagesContainer = document.getElementById('messagesContainer');
    const chatHeader = document.getElementById('chatHeader');
    const backToChatsBtn = document.getElementById('backToChatsBtn');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const imageUpload = document.getElementById('imageUpload');
    const attachImageBtn = document.getElementById('attachImageBtn');
    const imagePreview = document.getElementById('imagePreview');
    const previewImg = document.getElementById('previewImg');
    const removeImageBtn = document.getElementById('removeImageBtn');

    let currentUser = null;
    let selectedUserId = null;
    let selectedUserData = null;
    let currentChatId = null;
    let unsubscribeMessages = null;
    let unsubscribeChats = null;

    // Переключение вкладок
    window.switchTab = (tab) => {
        const tabs = document.querySelectorAll('.tab');
        tabs.forEach(t => t.classList.remove('active'));
        
        if (tab === 'chats') {
            tabs[0].classList.add('active');
            chatsSection.style.display = 'block';
            usersSection.style.display = 'none';
            chatSection.style.display = 'none';
            loadChats();
        } else {
            tabs[1].classList.add('active');
            chatsSection.style.display = 'none';
            usersSection.style.display = 'block';
            chatSection.style.display = 'none';
            loadUsers();
        }
    };

    // Загрузка всех пользователей
    const loadUsers = async () => {
        if (!currentUser) return;
        
        try {
            usersList.innerHTML = '<div class="loading">Загрузка пользователей...</div>';
            
            const usersQuery = query(collection(db, "users"));
            const snapshot = await getDocs(usersQuery);
            
            if (snapshot.empty) {
                usersList.innerHTML = '<div class="empty-state">Нет других пользователей</div>';
                return;
            }
            
            usersList.innerHTML = '';
            
            snapshot.forEach((doc) => {
                if (doc.id !== currentUser.uid) {
                    const userData = doc.data();
                    const userElement = document.createElement('div');
                    userElement.className = 'user-item';
                    userElement.innerHTML = `
                        <img src="${userData.photoURL || 'https://via.placeholder.com/45'}" class="user-avatar-small">
                        <div class="user-info-small">
                            <div class="user-name">${userData.displayName || 'Пользователь'}</div>
                            <div class="user-email-small">${userData.email || 'Email не указан'}</div>
                        </div>
                    `;
                    userElement.onclick = () => openChat(doc.id, userData);
                    usersList.appendChild(userElement);
                }
            });
        } catch (error) {
            console.error('Ошибка загрузки пользователей:', error);
            usersList.innerHTML = '<div class="empty-state">Ошибка загрузки пользователей</div>';
        }
    };

    // Загрузка чатов текущего пользователя
    const loadChats = async () => {
        if (!currentUser) return;
        
        try {
            chatsList.innerHTML = '<div class="loading">Загрузка чатов...</div>';
            
            const chatsQuery = query(
                collection(db, "chats"),
                where("participants", "array-contains", currentUser.uid),
                orderBy("lastMessageTime", "desc")
            );
            
            // Отписываемся от предыдущего слушателя
            if (unsubscribeChats) {
                unsubscribeChats();
            }
            
            unsubscribeChats = onSnapshot(chatsQuery, async (snapshot) => {
                if (snapshot.empty) {
                    chatsList.innerHTML = '<div class="empty-state">У вас пока нет чатов</div>';
                    return;
                }
                
                chatsList.innerHTML = '';
                
                for (const chatDoc of snapshot.docs) {
                    const chatData = chatDoc.data();
                    const otherUserId = chatData.participants.find(id => id !== currentUser.uid);
                    
                    // Получаем информацию о другом пользователе
                    const userDoc = await getDoc(doc(db, "users", otherUserId));
                    const userData = userDoc.data();
                    
                    if (!userData) continue;
                    
                    // Получаем последнее сообщение
                    const messagesQuery = query(
                        collection(db, "chats", chatDoc.id, "messages"),
                        orderBy("timestamp", "desc"),
                        limit(1)
                    );
                    const messagesSnapshot = await getDocs(messagesQuery);
                    let lastMessage = 'Нет сообщений';
                    let lastMessageTime = '';
                    
                    if (!messagesSnapshot.empty) {
                        const lastMsg = messagesSnapshot.docs[0].data();
                        lastMessage = lastMsg.text || '📷 Изображение';
                        if (lastMsg.timestamp?.toDate) {
                            const date = lastMsg.timestamp.toDate();
                            const now = new Date();
                            const diff = now - date;
                            
                            if (diff < 86400000) { // меньше дня
                                lastMessageTime = date.toLocaleTimeString().slice(0, 5);
                            } else {
                                lastMessageTime = date.toLocaleDateString();
                            }
                        }
                    }
                    
                    const chatElement = document.createElement('div');
                    chatElement.className = 'chat-item';
                    chatElement.innerHTML = `
                        <img src="${userData.photoURL || 'https://via.placeholder.com/45'}" class="user-avatar-small">
                        <div style="flex: 1;">
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <span class="user-name">${userData.displayName || 'Пользователь'}</span>
                                <span class="message-time">${lastMessageTime}</span>
                            </div>
                            <div class="last-message">${lastMessage}</div>
                        </div>
                    `;
                    chatElement.onclick = () => openChat(otherUserId, userData);
                    chatsList.appendChild(chatElement);
                }
            });
        } catch (error) {
            console.error('Ошибка загрузки чатов:', error);
            chatsList.innerHTML = '<div class="empty-state">Ошибка загрузки чатов</div>';
        }
    };

    // Открыть чат с пользователем
    const openChat = async (userId, userData) => {
        selectedUserId = userId;
        selectedUserData = userData;
        
        // Создаем ID чата (сортируем ID пользователей для уникальности)
        const chatId = [currentUser.uid, userId].sort().join('_');
        currentChatId = chatId;
        
        // Проверяем/создаем документ чата
        const chatRef = doc(db, "chats", chatId);
        const chatDoc = await getDoc(chatRef);
        
        if (!chatDoc.exists()) {
            await setDoc(chatRef, {
                participants: [currentUser.uid, userId],
                createdAt: serverTimestamp(),
                lastMessageTime: serverTimestamp()
            });
        }
        
        // Отображаем шапку чата
        chatHeader.innerHTML = `
            <img src="${userData.photoURL || 'https://via.placeholder.com/50'}" alt="Avatar">
            <div class="chat-header-info">
                <h3>${userData.displayName || 'Пользователь'}</h3>
                <p>${userData.email || ''}</p>
            </div>
        `;
        
        // Отписываемся от предыдущих сообщений
        if (unsubscribeMessages) {
            unsubscribeMessages();
        }
        
        // Подписываемся на сообщения в этом чате
        const messagesQuery = query(
            collection(db, "chats", chatId, "messages"),
            orderBy("timestamp", "asc")
        );
        
        unsubscribeMessages = onSnapshot(messagesQuery, (snapshot) => {
            messagesContainer.innerHTML = '';
            
            if (snapshot.empty) {
                messagesContainer.innerHTML = '<div class="empty-state">Нет сообщений. Напишите первое сообщение!</div>';
                return;
            }
            
            snapshot.forEach((doc) => {
                const message = doc.data();
                const messageElement = document.createElement('div');
                messageElement.className = `message ${message.senderId === currentUser.uid ? 'sent' : 'received'}`;
                
                let messageHTML = '';
                
                if (message.text) {
                    messageHTML += `<div>${message.text}</div>`;
                }
                
                if (message.imageUrl) {
                    messageHTML += `<img src="${message.imageUrl}" class="message-image" onclick="window.open(this.src)">`;
                }
                
                const timeStr = message.timestamp?.toDate 
                    ? message.timestamp.toDate().toLocaleTimeString()
                    : 'Только что';
                
                messageHTML += `<div class="message-time">${timeStr}</div>`;
                
                messageElement.innerHTML = messageHTML;
                messagesContainer.appendChild(messageElement);
            });
            
            // Скролл вниз
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        });
        
        // Переключаем отображение
        chatsSection.style.display = 'none';
        usersSection.style.display = 'none';
        chatSection.style.display = 'block';
    };

    // Отправка сообщения
    sendBtn.addEventListener('click', async () => {
        if (!currentUser || !selectedUserId || !currentChatId) {
            alert('Ошибка: выберите получателя');
            return;
        }

        const text = messageInput.value.trim();
        const imageFile = imageUpload.files[0];
        
        if (!text && !imageFile) {
            alert('Введите сообщение или выберите изображение');
            return;
        }

        sendBtn.disabled = true;
        sendBtn.textContent = 'Отправка...';

        try {
            let imageUrl = null;
           
            if (imageFile) {
                const storageRef = ref(storage, `dm_images/${Date.now()}_${imageFile.name}`);
                await uploadBytes(storageRef, imageFile);
                imageUrl = await getDownloadURL(storageRef);
            }

            // Добавляем сообщение
            await addDoc(collection(db, "chats", currentChatId, "messages"), {
                text: text || null,
                imageUrl: imageUrl,
                senderId: currentUser.uid,
                receiverId: selectedUserId,
                timestamp: serverTimestamp(),
                read: false
            });

            // Обновляем время последнего сообщения в чате
            await updateDoc(doc(db, "chats", currentChatId), {
                lastMessageTime: serverTimestamp()
            });

            // Очищаем форму
            messageInput.value = '';
            imageUpload.value = '';
            imagePreview.style.display = 'none';
           
        } catch (e) {
            console.error('Ошибка:', e);
            alert('Ошибка при отправке сообщения');
        } finally {
            sendBtn.disabled = false;
            sendBtn.textContent = '📤 Отправить сообщение';
        }
    });

    // Прикрепление изображения
    attachImageBtn.addEventListener('click', () => {
        imageUpload.click();
    });

    // Предпросмотр изображения
    imageUpload.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImg.src = e.target.result;
                imagePreview.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }
    });

    // Удаление изображения
    removeImageBtn.addEventListener('click', () => {
        imageUpload.value = '';
        imagePreview.style.display = 'none';
    });

    // Кнопка назад к списку чатов
    backToChatsBtn.addEventListener('click', () => {
        if (unsubscribeMessages) {
            unsubscribeMessages();
        }
        chatSection.style.display = 'none';
        chatsSection.style.display = 'block';
        usersSection.style.display = 'none';
        
        // Активируем вкладку Чаты
        const tabs = document.querySelectorAll('.tab');
        tabs.forEach(t => t.classList.remove('active'));
        tabs[0].classList.add('active');
        
        loadChats();
    });

    // Сохранение пользователя в Firestore
    const saveUserToFirestore = async (user) => {
        const userRef = doc(db, "users", user.uid);
        await setDoc(userRef, {
            email: user.email,
            displayName: user.displayName,
            photoURL: user.photoURL,
            lastSeen: serverTimestamp()
        }, { merge: true });
    };

    // Отслеживание состояния аутентификации
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            loginBtn.style.display = 'none';
            logoutBtn.style.display = 'block';
            userInfo.style.display = 'flex';
            userAvatar.src = user.photoURL || 'https://via.placeholder.com/40';
            userEmail.textContent = user.email;
            mainContent.style.display = 'block';
            guestMessage.style.display = 'none';
            
            await saveUserToFirestore(user);
            loadChats(); // Загружаем чаты при входе
        } else {
            currentUser = null;
            loginBtn.style.display = 'block';
            logoutBtn.style.display = 'none';
            userInfo.style.display = 'none';
            mainContent.style.display = 'none';
            guestMessage.style.display = 'block';
            
            // Отписываемся от всех слушателей
            if (unsubscribeMessages) {
                unsubscribeMessages();
            }
            if (unsubscribeChats) {
                unsubscribeChats();
            }
        }
    });
<div style="display: flex; gap: 10px; align-items: center; margin-bottom: 10px;">
    <h3 style="margin: 0;">Все пользователи</h3>
    <button id="refreshUsersBtn" style="width: auto; padding: 5px 15px; background: #28a745;">🔄 Обновить</button>
</div>
<div id="usersList" class="users-list"></div>
    // Вход через Google
    loginBtn.addEventListener('click', async () => {
        try {
            await signInWithPopup(auth, provider);
        } catch (error) {
            alert('Ошибка входа: ' + error.message);
        }
    });

    // Выход
    logoutBtn.addEventListener('click', async () => {
        try {
            await signOut(auth);
        } catch (error) {
            alert('Ошибка выхода: ' + error.message);
        }
    });

    // Enter отправляет сообщение (Shift+Enter для новой строки)
    messageInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendBtn.click();
        }
    });

</script>
</body>
</html>
