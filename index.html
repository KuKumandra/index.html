<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Монитор статусов</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👥</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        h1 {
            font-size: 28px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            margin: 5px 0;
        }
        
        button.google {
            background: #4285f4;
        }
        
        button.logout {
            background: #ef4444;
        }
        
        button.online {
            background: #4ade80;
            color: #166534;
        }
        
        button.offline {
            background: #cbd5e1;
            color: #475569;
        }
        
        .user-card {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .avatar {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            color: white;
        }
        
        .user-stats {
            flex: 1;
        }
        
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 15px;
        }
        
        .stat-item {
            text-align: center;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 12px;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        
        .online-badge {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4ade80;
            margin-right: 8px;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }
        
        .profile-list {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .profile-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid #e9ecef;
        }
        
        .profile-item.current-user {
            background: #dbeafe;
        }
        
        .profile-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .profile-avatar {
            width: 40px;
            height: 40px;
            background: #cbd5e1;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        
        .online-count {
            background: #4ade80;
            color: #166534;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .hidden {
            display: none;
        }
        
        .message {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 16px;
        }
        
        .message.success {
            background: #d1fae5;
            color: #065f46;
        }
        
        .message.error {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .timer {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        
        .mb-2 {
            margin-bottom: 10px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="flex">
                <div>
                    <h1>📚 Монитор статусов</h1>
                    <p style="color: #666;">Онлайн + Время учебы</p>
                </div>
                <div id="authButtons">
                    <button id="googleBtn" class="google">🔐 Войти через Google</button>
                    <button id="logoutBtn" class="logout hidden">🚪 Выйти</button>
                </div>
            </div>
        </div>
        
        <div id="messageContainer"></div>
        
        <div id="mainContent" class="hidden">
            <!-- Профиль пользователя -->
            <div class="card">
                <div class="user-card">
                    <div class="avatar" id="userAvatar">👤</div>
                    <div class="user-stats">
                        <h2 id="userName"></h2>
                        <div class="stat-grid" id="userStats">
                            <div class="stat-item">
                                <div class="stat-value" id="totalMinutes">0</div>
                                <div class="stat-label">⏱️ Всего минут</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value" id="sessionMinutes">0</div>
                                <div class="stat-label">🎯 Текущая сессия</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value" id="achievementsCount">0</div>
                                <div class="stat-label">🏅 Достижений</div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div style="margin-top: 20px; display: flex; gap: 10px;">
                    <button id="onlineBtn" class="online">🟢 В сети</button>
                    <button id="offlineBtn" class="offline">⚫ Не в сети</button>
                </div>
            </div>
            
            <!-- Онлайн пользователи -->
            <div class="card">
                <div class="flex mb-2">
                    <h2>🟢 Сейчас онлайн</h2>
                    <span id="onlineCount" class="online-count">0</span>
                </div>
                <div id="onlineUsersList" class="profile-list">
                    <div style="text-align: center;">Загрузка...</div>
                </div>
            </div>
            
            <!-- Все пользователи -->
            <div class="card">
                <h2>👥 Все пользователи</h2>
                <div id="allUsersList" class="profile-list">
                    <div style="text-align: center;">Загрузка...</div>
                </div>
            </div>
        </div>
        
        <div id="guestMessage" class="card">
            <div style="text-align: center; padding: 40px;">
                <h3>👋 Добро пожаловать!</h3>
                <p style="margin: 15px 0;">Войдите через Google, чтобы отслеживать время учебы</p>
                <button id="guestGoogleBtn" class="google">🔐 Войти через Google</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // КОНФИГУРАЦИЯ
        // ============================================
        const SUPABASE_URL = 'https://gptbqzvbeehcmrijdxlz.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_xBXWyJ7XEGgE9104I3e0Mg_6qZsHmv9';
        
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // ============================================
        // ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ
        // ============================================
        let currentUser = null;
        let sessionStartTime = null;
        let sessionInterval = null;
        
        // ============================================
        // ФУНКЦИИ ДЛЯ СООБЩЕНИЙ
        // ============================================
        function showMessage(text, type = 'success') {
            const container = document.getElementById('messageContainer');
            container.innerHTML = `<div class="message ${type}">${text}</div>`;
            setTimeout(() => container.innerHTML = '', 3000);
        }
        
        // ============================================
        // ЗАГРУЗКА ПОЛЬЗОВАТЕЛЕЙ
        // ============================================
        async function loadUsers() {
            try {
                const { data, error } = await supabaseClient
                    .from('profiles')
                    .select('*')
                    .order('username');
                
                if (error) throw error;
                
                const onlineUsers = data?.filter(u => u.status === 'online') || [];
                const onlineCount = onlineUsers.length;
                document.getElementById('onlineCount').textContent = onlineCount;
                
                // Онлайн пользователи
                let onlineHtml = '';
                onlineUsers.forEach(user => {
                    const isMe = currentUser && user.id === currentUser.id;
                    onlineHtml += `
                        <div class="profile-item ${isMe ? 'current-user' : ''}">
                            <div class="profile-info">
                                <div class="profile-avatar">${(user.username || '?').substring(0,2).toUpperCase()}</div>
                                <div><strong>${user.username} ${isMe ? '(вы)' : ''}</strong></div>
                            </div>
                            <span><span class="online-badge"></span> онлайн</span>
                        </div>
                    `;
                });
                document.getElementById('onlineUsersList').innerHTML = onlineHtml || '<div style="text-align: center;">Нет пользователей онлайн</div>';
                
                // Все пользователи
                let allHtml = '';
                data?.forEach(user => {
                    const isMe = currentUser && user.id === currentUser.id;
                    allHtml += `
                        <div class="profile-item ${isMe ? 'current-user' : ''}">
                            <div class="profile-info">
                                <div class="profile-avatar">${(user.username || '?').substring(0,2).toUpperCase()}</div>
                                <div><strong>${user.username} ${isMe ? '(вы)' : ''}</strong></div>
                            </div>
                            <span>${user.status === 'online' ? '🟢 онлайн' : '⚫ офлайн'}</span>
                        </div>
                    `;
                });
                document.getElementById('allUsersList').innerHTML = allHtml || '<div style="text-align: center;">Нет пользователей</div>';
                
            } catch (error) {
                console.error('Ошибка загрузки:', error);
            }
        }
        
        // ============================================
        // ЗАГРУЗКА СТАТИСТИКИ
        // ============================================
        async function loadUserStats() {
            if (!currentUser) return;
            
            try {
                const { data: profile, error } = await supabaseClient
                    .from('profiles')
                    .select('total_study_minutes')
                    .eq('id', currentUser.id)
                    .single();
                
                if (!error && profile) {
                    const totalHours = Math.floor(profile.total_study_minutes / 60);
                    const totalMins = profile.total_study_minutes % 60;
                    document.getElementById('totalMinutes').textContent = `${totalHours}ч ${totalMins}м`;
                }
                
                // Получаем количество достижений
                const { count } = await supabaseClient
                    .from('user_achievements')
                    .select('*', { count: 'exact', head: true })
                    .eq('user_id', currentUser.id);
                
                document.getElementById('achievementsCount').textContent = count || 0;
                
            } catch (error) {
                console.error('Ошибка статистики:', error);
            }
        }
        
        // ============================================
        // ТАЙМЕР СЕССИИ
        // ============================================
        function startSessionTimer() {
            if (sessionInterval) clearInterval(sessionInterval);
            
            sessionStartTime = new Date();
            
            sessionInterval = setInterval(() => {
                if (sessionStartTime) {
                    const now = new Date();
                    const diffSeconds = Math.floor((now - sessionStartTime) / 1000);
                    const minutes = Math.floor(diffSeconds / 60);
                    const seconds = diffSeconds % 60;
                    document.getElementById('sessionMinutes').textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                }
            }, 1000);
        }
        
        // ============================================
        // ОБНОВЛЕНИЕ СТАТУСА
        // ============================================
        async function updateStatus(status) {
            if (!currentUser) return;
            
            try {
                await supabaseClient
                    .from('profiles')
                    .update({ 
                        status: status,
                        last_seen: new Date().toISOString()
                    })
                    .eq('id', currentUser.id);
                
                currentUser.status = status;
                showMessage(`Статус изменен на ${status === 'online' ? 'В сети' : 'Не в сети'}`);
                loadUsers();
            } catch (error) {
                showMessage('Ошибка обновления статуса', 'error');
            }
        }
        
        // ============================================
        // ОБНОВЛЕНИЕ UI
        // ============================================
        function updateUI(user) {
            if (user) {
                document.getElementById('mainContent').classList.remove('hidden');
                document.getElementById('guestMessage').classList.add('hidden');
                document.getElementById('googleBtn').classList.add('hidden');
                document.getElementById('logoutBtn').classList.remove('hidden');
                
                document.getElementById('userAvatar').textContent = (user.username || 'U').substring(0,2).toUpperCase();
                document.getElementById('userName').textContent = user.username || 'Пользователь';
                
                loadUserStats();
                startSessionTimer();
            } else {
                document.getElementById('mainContent').classList.add('hidden');
                document.getElementById('guestMessage').classList.remove('hidden');
                document.getElementById('googleBtn').classList.remove('hidden');
                document.getElementById('logoutBtn').classList.add('hidden');
                
                if (sessionInterval) {
                    clearInterval(sessionInterval);
                    sessionInterval = null;
                }
            }
        }
        
        // ============================================
        // ОБРАБОТЧИКИ
        // ============================================
        document.getElementById('googleBtn').onclick = async () => {
            const { error } = await supabaseClient.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.href.split('#')[0] }
            });
            if (error) showMessage(error.message, 'error');
        };
        
        document.getElementById('guestGoogleBtn').onclick = async () => {
            const { error } = await supabaseClient.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.href.split('#')[0] }
            });
            if (error) showMessage(error.message, 'error');
        };
        
        document.getElementById('logoutBtn').onclick = async () => {
            await supabaseClient.auth.signOut();
            currentUser = null;
            updateUI(null);
            loadUsers();
        };
        
        document.getElementById('onlineBtn').onclick = () => updateStatus('online');
        document.getElementById('offlineBtn').onclick = () => updateStatus('offline');
        
        // ============================================
        // ОТСЛЕЖИВАНИЕ ВХОДА
        // ============================================
        supabaseClient.auth.onAuthStateChange(async (event, session) => {
            console.log('Auth event:', event);
            
            if (event === 'SIGNED_IN' && session?.user) {
                const { data: existing } = await supabaseClient
                    .from('profiles')
                    .select('*')
                    .eq('id', session.user.id)
                    .maybeSingle();
                
                if (!existing) {
                    const newUser = {
                        id: session.user.id,
                        username: session.user.user_metadata?.full_name || session.user.email?.split('@')[0] || 'Пользователь',
                        status: 'online'
                    };
                    await supabaseClient.from('profiles').insert([newUser]);
                    currentUser = newUser;
                } else {
                    currentUser = existing;
                    await supabaseClient
                        .from('profiles')
                        .update({ status: 'online', last_seen: new Date().toISOString() })
                        .eq('id', currentUser.id);
                }
                
                updateUI(currentUser);
                loadUsers();
                showMessage(`Добро пожаловать, ${currentUser.username}!`);
            }
            
            if (event === 'SIGNED_OUT') {
                if (currentUser) {
                    await supabaseClient
                        .from('profiles')
                        .update({ status: 'offline' })
                        .eq('id', currentUser.id);
                }
                currentUser = null;
                updateUI(null);
                loadUsers();
            }
        });
        
        // ============================================
        // ИНИЦИАЛИЗАЦИЯ
        // ============================================
        loadUsers();
        
        // Проверяем, есть ли токен в URL
        if (window.location.hash && window.location.hash.includes('access_token')) {
            console.log('Токен найден, очищаем URL');
            history.replaceState(null, '', window.location.pathname);
        }
    </script>
</body>
</html>
