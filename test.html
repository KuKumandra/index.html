<!DOCTYPE html>
<html>
<head>
    <title>Test Supabase</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Тест подключения к Supabase</h1>
    <div id="result">Проверка...</div>
    
    <script>
        const SUPABASE_URL = 'https://gptbqzvbeehcmrijdxlz.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_xBXWyJ7XEGgE9104I3e0Mg_6qZsHmv9';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        async function test() {
            try {
                const { data, error } = await supabase
                    .from('profiles')
                    .select('*')
                    .limit(5);
                
                if (error) {
                    document.getElementById('result').innerHTML = '❌ Ошибка: ' + error.message;
                } else {
                    document.getElementById('result').innerHTML = '✅ Подключение работает! Найдено пользователей: ' + (data?.length || 0);
                }
            } catch (e) {
                document.getElementById('result').innerHTML = '❌ Ошибка: ' + e.message;
            }
        }
        
        test();
    </script>
</body>
</html>
